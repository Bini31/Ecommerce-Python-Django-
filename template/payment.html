{% extends 'base.html' %}
{% load static %}
{%block header %}
    <div class="hero-wrap hero-bread" style="background-image: url({% static 'images/bg_1.jpg' %});">
      <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
          <div class="col-md-9 ftco-animate text-center">
          	<p class="breadcrumbs"><span class="mr-2"><a href="index.html">Home</a></span> <span>Register</span></p>
            <h1 class="mb-0 bread">Payment</h1>
          </div>
        </div>
      </div>
    </div>
{% endblock %}
{% block content %}
<div class="container mt-5 p-5 text-center w-50">
{% if payment %}
<form action="{% url 'cart:paymentsuccess' %}" method="POST">
<script
   src="https://checkout.razorpay.com/v1/checkout.js"
    data-key="rzp_test_SfMluChWM311bz"
    data-amount={{payment.amount}}
    data-currency="INR"
    data-order_id="{{payment.id}}"
    data-buttontext="Pay with Razorpay"
    data-name="My Shop"
    data-description="A Wild Sheep Chase is the third novel by Japanese author Haruki Murakami"
    data-image="https://example.com/your_logo.jpg"
    data-prefill.name="{{user.usename}}"
    data-prefill.email="gaurav.kumar@example.com"
    data-theme.color="#F37254"
></script>
<input type="hidden" custom="Hidden Element" name="hidden"/>
</form>
{% else %}
<h2 class="text-success">Order Placed Successfully</h2>
    <a href="{% url 'shop:categories' %}">Continue shopping</a>
{% endif %}
</div>
{% endblock %}
